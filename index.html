<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCC 標籤品檢工具</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        #reader { width: 100%; max-width: 500px; margin: auto; }
        .result-box { margin-top: 20px; padding: 20px; font-size: 24px; font-weight: bold; border-radius: 10px; }
        .ok { background-color: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .ng { background-color: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }
        input { width: 80%; padding: 10px; margin: 10px 0; font-size: 16px; }
    </style>
</head>
<body>
    <h2>FCC 標籤條碼比對系統</h2>
    
    <div>
        <label>請輸入/掃描範本 (不含流水號的部分)：</label><br>
        <input type="text" id="templateInput" placeholder="範本內容..." value="]d2010818775667890111260319211103266">
    </div>

    <div id="reader"></div>

    <div id="resultDisplay" class="result-box" style="display:none;">
        掃描結果：<span id="scannedText"></span><br>
        判定：<span id="status"></span>
    </div>

    <script>
        const templateInput = document.getElementById('templateInput');
        const resultDisplay = document.getElementById('resultDisplay');
        const scannedText = document.getElementById('scannedText');
        const status = document.getElementById('status');

        function onScanSuccess(decodedText) {
            // 顯示原始內容
            resultDisplay.style.display = "block";
            scannedText.innerText = decodedText;

            // 邏輯處理：剔除最後 4 碼流水號
            const baseContent = decodedText.substring(0, decodedText.length - 4);
            const template = templateInput.value.trim();

            if (baseContent === template) {
                status.innerText = "PASS (OK)";
                resultDisplay.className = "result-box ok";
            } else {
                status.innerText = "FAIL (NG)";
                resultDisplay.className = "result-box ng";
            }
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
