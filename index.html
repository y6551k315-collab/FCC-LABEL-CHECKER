<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FCC 標籤比對系統 (高相容版)</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary-color: #007bff; --success-color: #28a745; --fail-color: #dc3545; }
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 0; margin: 0; background-color: #f0f2f5; color: #333; }
        #camera-container { position: relative; width: 100%; max-width: 500px; margin: 0 auto; background: #000; overflow: hidden; border-bottom: 3px solid #ddd; aspect-ratio: 1/1; }
        #reader { width: 100%; height: 100%; }
        .control-panel { padding: 15px; max-width: 470px; margin: 0 auto; text-align: left; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 15px; }
        .card-title { font-weight: bold; font-size: 14px; color: #666; margin-bottom: 8px; display: block; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .zoom-controls { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        #resultDisplay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; box-sizing: border-box; }
        .result-content { background: white; width: 100%; max-width: 400px; border-radius: 16px; padding: 30px; text-align: center; }
        .status-icon { font-size: 64px; margin-bottom: 15px; }
        .status-text { font-size: 32px; font-weight: bold; margin-bottom: 20px; }
        .pass-text { color: var(--success-color); }
        .fail-text { color: var(--fail-color); }
        .code-detail { font-size: 12px; color: #777; word-break: break-all; background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 25px; max-height: 80px; overflow-y: auto; }
        .action-btn { background: var(--primary-color); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="camera-container">
        <div id="reader"></div>
    </div>

    <div class="control-panel">
        <div class="card" id="zoomCard" style="display:none;">
            <span class="card-title">🔍 鏡頭縮放 (Zoom)</span>
            <div class="zoom-controls">
                <span>1x</span>
                <input type="range" id="zoomSlider" min="1" max="4" step="0.1" value="1">
                <span id="zoomVal">1</span>x
            </div>
        </div>

        <div class="card">
            <span class="card-title">📋 比對範本 (只要包含即 PASS)</span>
            <input type="text" id="templateInput" value="]d2010818775667890111260319211103266">
        </div>
    </div>

    <div id="resultDisplay">
        <div class="result-content">
            <div id="statusIcon" class="status-icon">✅</div>
            <div id="statusText" class="status-text pass-text">判定中...</div>
            <div class="code-detail">完整條碼：<br><span id="scannedText"></span></div>
            <button class="action-btn" onclick="resetScanner()">繼續掃描下一個</button>
        </div>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        let cameraTrack;

        const config = { 
            fps: 20, 
            qrbox: (w, h) => { return { width: Math.min(w, h) * 0.7, height: Math.min(w, h) * 0.7 }; }
        };

        function startCamera() {
            // 使用最基礎的參數啟動，確保相容性
            html5QrCode.start(
                { facingMode: "environment" }, 
                config, 
                onScanSuccess
            )
            .then(() => {
                // 成功開啟相機後，再嘗試探測硬體能力 (Zoom)
                try {
                    cameraTrack = html5QrCode.getRunningTrack();
                    const capabilities = cameraTrack.getCapabilities();
                    if (capabilities.zoom) {
                        document.getElementById('zoomCard').style.display = 'block';
                        setupZoom(cameraTrack, capabilities);
                    }
                } catch (e) { console.log("不支援進階縮放控制"); }
            })
            .catch(err => {
                alert("相機啟動失敗。請確認：\n1. 網址開頭為 HTTPS\n2. 已開啟權限\n3. 無其他程式佔用相機");
            });
        }

        function setupZoom(track, capabilities) {
            const slider = document.getElementById('zoomSlider');
            const valText = document.getElementById('zoomVal');
            slider.min = capabilities.zoom.min;
            slider.max = capabilities.zoom.max;
            
            slider.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                valText.innerText = val.toFixed(1);
                track.applyConstraints({ advanced: [{ zoom: val }] });
            });
        }

        function onScanSuccess(decodedText) {
            html5QrCode.pause();
            const template = document.getElementById('templateInput').value.trim();
            const isPass = decodedText.includes(template);

            document.getElementById('scannedText').innerText = decodedText;
            document.getElementById('resultDisplay').style.display = "flex";

            if (isPass) {
                document.getElementById('statusIcon').innerText = "✅";
                document.getElementById('statusText').innerText = "PASS (正確)";
                document.getElementById('statusText').className = "status-text pass-text";
            } else {
                document.getElementById('statusIcon').innerText = "❌";
                document.getElementById('statusText').innerText = "FAIL (錯誤)";
                document.getElementById('statusText').className = "status-text fail-text";
            }
        }

        function resetScanner() {
            document.getElementById('resultDisplay').style.display = "none";
            html5QrCode.resume();
        }

        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
