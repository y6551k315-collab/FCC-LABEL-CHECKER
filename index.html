<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCC 標籤比對系統 v2.0</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 15px; background-color: #f4f7f6; }
        h2 { color: #333; margin-bottom: 10px; }
        #reader { width: 100%; max-width: 500px; margin: 10px auto; border: 2px solid #ddd; border-radius: 8px; overflow: hidden; }
        .config-section { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        .result-box { margin-top: 20px; padding: 25px; font-size: 28px; font-weight: bold; border-radius: 12px; display: none; transition: 0.3s; }
        .ok { background-color: #28a745; color: white; box-shadow: 0 4px 15px rgba(40,167,69,0.4); }
        .ng { background-color: #dc3545; color: white; box-shadow: 0 4px 15px rgba(220,53,69,0.4); }
        .detail-text { font-size: 14px; margin-top: 10px; word-break: break-all; opacity: 0.9; }
        button { background: #007bff; color: white; border: none; padding: 12px 25px; border-radius: 5px; font-size: 18px; cursor: pointer; margin-top: 15px; }
        button:active { background: #0056b3; }
    </style>
</head>
<body>

    <h2>FCC 標籤比對系統</h2>

    <div class="config-section">
        <label><strong>1. 設定比對範本 (不含最後4碼流水號)</strong></label><br>
        <input type="text" id="templateInput" placeholder="請掃描或輸入正確範本..." value="]d2010818775667890111260319211103266">
    </div>

    <div id="reader"></div>

    <div id="resultDisplay" class="result-box">
        <div id="statusText">判定中...</div>
        <div class="detail-text">原始內容: <span id="scannedText"></span></div>
        <button onclick="resetScanner()">繼續掃描下一件</button>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const templateInput = document.getElementById('templateInput');
        const resultDisplay = document.getElementById('resultDisplay');
        const scannedText = document.getElementById('scannedText');
        const statusText = document.getElementById('statusText');

        const config = { 
            fps: 15, 
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0 
        };

        // 啟動相機 (強制後置鏡頭 environment)
        function startCamera() {
            html5QrCode.start(
                { facingMode: "environment" }, 
                config, 
                onScanSuccess
            ).catch(err => {
                alert("相機啟動失敗，請確認是否開啟 HTTPS 或 授權相機權限。");
                console.error(err);
            });
        }

        function onScanSuccess(decodedText) {
            // 暫停掃描避免重複觸發
            html5QrCode.pause();
            
            resultDisplay.style.display = "block";
            scannedText.innerText = decodedText;

            // 邏輯比對：剔除最後 4 碼
            const baseContent = decodedText.substring(0, decodedText.length - 4);
            const template = templateInput.value.trim();
            const isPass = (baseContent === template);

            if (isPass) {
                statusText.innerText = "✅ PASS (正確)";
                resultDisplay.className = "result-box ok";
            } else {
                statusText.innerText = "❌ FAIL (錯誤)";
                resultDisplay.className = "result-box ng";
            }

            // 選選：傳送資料到 Google Sheets (請替換為您的 GAS URL)
            /*
            fetch('您的_APPS_SCRIPT_URL', {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    fullCode: decodedText,
                    template: template,
                    status: isPass ? "PASS" : "NG"
                })
            });
            */
        }

        function resetScanner() {
            resultDisplay.style.display = "none";
            html5QrCode.resume(); // 恢復掃描
        }

        // 初始化開啟相機
        startCamera();
    </script>
</body>
</html>
